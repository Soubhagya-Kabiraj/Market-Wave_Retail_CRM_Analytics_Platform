{% extends 'main.html' %}
{% load static %}

{% block content %}
<br>
<style>
    .warning-badge {
        background: rgba(255, 67, 67, 0.1);
        color: #ff4343;
        font-size: 0.7rem;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 20px;
        letter-spacing: 0.4px;
    }
</style>
<div class="container d-flex justify-content-center">
    <div class="card shadow-sm" style="width: 30rem;">
        <div class="card-body text-center">
            <div>
            <h5 class="fw-bold mb-2">⚠️ Confirm Delete</h5>
            <span class="warning-badge mb-3 d-inline-block">
                PERMANENT ACTION
            </span>
            </div>
            {% if product.pic %}
                <img src="{{ product.pic.url }}"
                     alt="{{ product.name }}"
                     class="img-fluid rounded mb-3"
                     style="max-height:180px; object-fit:contain;">
            {% else %}
                <p class="text-muted">No image available</p>
            {% endif %}

            <h6 class="fw-bold mb-1">{{ product.name }}</h6>
            <small class="text-muted d-block mb-3">
                This product will be permanently removed
            </small>
            <form method="POST">
                {% csrf_token %}
                <a href="{% url 'product' %}" class="btn btn-outline-secondary me-2">
                    Cancel
                </a>
                <button type="submit" class="btn btn-danger">
                    Delete
                </button>
            </form>

        </div>
    </div>
</div>

{% endblock %}
