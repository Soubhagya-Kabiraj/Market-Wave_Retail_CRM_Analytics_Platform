{% extends 'main.html' %}
{% load static %}

{% block content %}
<br>

<div class="container d-flex justify-content-center fade-up">
    <div class="card shadow-sm" style="width: 28rem;">
        <div class="card-body text-center p-4">

            <h5 class="card-title text-primary fw-bold mb-2">
                📂 Import CSV File
            </h5>
            <p class="text-muted mb-4">
                Upload a CSV file to add tags
            </p>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-4">
                    <input 
                        type="file" 
                        name="csv_file" 
                        class="form-control"
                        accept=".csv"
                        required
                    >
                </div>

                <div class="d-flex justify-content-center gap-3">
                    <a class="btn btn-outline-secondary" href="{% url 'tag_list' %}">
                        Cancel
                    </a>

                    <button type="submit" class="btn btn-success px-4">
                        Import
                    </button>
                </div>
            </form>

        </div>
    </div>
</div>

{% endblock %}
